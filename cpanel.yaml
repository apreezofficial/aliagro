# ============================================================
# AliAgro - cPanel Deployment Configuration
# Laravel 13 API | PHP 8.3+
# ============================================================

deployment:
  name: AliAgro API
  description: Farm-to-consumer marketplace backend API

# ── PHP Configuration ────────────────────────────────────────
php:
  version: "8.3"
  extensions:
    - pdo
    - pdo_mysql
    - mbstring
    - openssl
    - tokenizer
    - xml
    - ctype
    - json
    - bcmath
    - fileinfo
    - gd          # for image processing
    - curl
    - zip
    - intl
  ini:
    upload_max_filesize: "10M"
    post_max_size: "12M"
    max_execution_time: 120
    memory_limit: "256M"

# ── Document Root ────────────────────────────────────────────
# Point your cPanel domain document root to /public
document_root: public

# ── Database ─────────────────────────────────────────────────
database:
  connection: mysql
  # Create these in cPanel > MySQL Databases
  name: aliagro_db
  username: aliagro_user
  # Set password in cPanel MySQL Databases wizard
  charset: utf8mb4
  collation: utf8mb4_unicode_ci

# ── Environment Variables ─────────────────────────────────────
# Set these in cPanel > Software > Setup PHP App > Environment Variables
# OR copy .env.example to .env and fill in values
env:
  APP_NAME: AliAgro
  APP_ENV: production
  APP_DEBUG: false
  APP_URL: https://yourdomain.com

  DB_CONNECTION: mysql
  DB_HOST: localhost
  DB_PORT: 3306
  DB_DATABASE: aliagro_db
  DB_USERNAME: aliagro_user
  DB_PASSWORD: "YOUR_DB_PASSWORD"

  SESSION_DRIVER: database
  CACHE_STORE: database
  QUEUE_CONNECTION: database

  FILESYSTEM_DISK: public

  MAIL_MAILER: smtp
  MAIL_HOST: mail.yourdomain.com
  MAIL_PORT: 465
  MAIL_USERNAME: support@aliagro.com
  MAIL_PASSWORD: "YOUR_MAIL_PASSWORD"
  MAIL_ENCRYPTION: ssl
  MAIL_FROM_ADDRESS: support@aliagro.com
  MAIL_FROM_NAME: AliAgro

  GOOGLE_CLIENT_ID: "YOUR_GOOGLE_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "YOUR_GOOGLE_CLIENT_SECRET"
  GOOGLE_REDIRECT_URI: https://yourdomain.com/api/auth/google/callback

  FRONTEND_URL: https://yourdomain.com

# ── Deployment Steps ─────────────────────────────────────────
# Run these commands via cPanel Terminal or SSH after uploading files
setup_commands:
  - "composer install --no-dev --optimize-autoloader --no-interaction"
  - "php artisan key:generate --force"
  - "php artisan migrate --force"
  - "php artisan db:seed --force"
  - "php artisan storage:link"
  - "php artisan config:cache"
  - "php artisan route:cache"
  - "php artisan view:cache"
  - "php artisan optimize"

# ── .htaccess for /public ────────────────────────────────────
# The public/.htaccess is already included in the project.
# If your host requires it at root level, add this to root .htaccess:
htaccess_root_note: |
  <IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteRule ^(.*)$ public/$1 [L]
  </IfModule>

# ── File Permissions ─────────────────────────────────────────
permissions:
  - path: storage
    mode: "775"
  - path: bootstrap/cache
    mode: "775"
  - path: public/storage
    mode: "775"

# ── Cron Jobs ────────────────────────────────────────────────
# Add in cPanel > Cron Jobs
cron_jobs:
  - schedule: "* * * * *"
    command: "php /home/USERNAME/public_html/artisan schedule:run >> /dev/null 2>&1"
    description: Laravel task scheduler (every minute)

# ── Queue Worker ─────────────────────────────────────────────
# If your host supports background processes, add this cron:
queue_worker:
  command: "php /home/USERNAME/public_html/artisan queue:work --sleep=3 --tries=3 --max-time=3600"
  schedule: "* * * * *"
  note: "Replace USERNAME with your actual cPanel username"

# ── Storage / Uploads ────────────────────────────────────────
storage:
  disk: public
  upload_paths:
    - storage/app/public/products
    - storage/app/public/avatars
    - storage/app/public/kyc
    - storage/app/public/farms
    - storage/app/public/reviews
    - storage/app/public/categories

# ── SSL ──────────────────────────────────────────────────────
ssl:
  required: true
  note: "Enable AutoSSL in cPanel > SSL/TLS Status for free Let's Encrypt cert"

# ── Demo Credentials (after seeding) ─────────────────────────
demo_accounts:
  admin:
    email: admin@aliagro.com
    password: Admin@1234
  farmer:
    email: farmer@aliagro.com
    password: Farmer@1234
  consumer:
    email: consumer@aliagro.com
    password: Consumer@1234

# ── API Base URL ──────────────────────────────────────────────
api:
  base_url: https://yourdomain.com/api
  version: v1
  auth: Bearer Token (Laravel Sanctum)
  docs_note: "Import the Postman collection from /docs/aliagro.postman.json"
